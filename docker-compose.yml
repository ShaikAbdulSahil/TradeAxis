version: '3.8'

services:
  # Real-time Ticker & Cache Engine
  redis:
    image: redis:alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --appendonly yes # Keep data safe

  # Your NestJS Backend
  api:
    build: .
    container_name: trading_api
    ports:
      - "3000:3000"
    env_file:
      - .env # Loads your Neon URL and Kite keys
    environment:
      - REDIS_HOST=redis # Docker network alias for the redis service
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always
