version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tradeaxis_redis
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: tradeaxis_redis_ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
